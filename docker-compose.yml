name: starti-backend
services:
  starti-database:
    image: postgres:latest
    container_name: starti-database
    environment:
      POSTGRES_DB: ${PG_DB_NAME}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_USER: ${PG_USER}
    volumes:
      - db-volume:/var/lib/postgresql/data
    ports:
      - 5432:${PG_PORT}

volumes:
  db-volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
